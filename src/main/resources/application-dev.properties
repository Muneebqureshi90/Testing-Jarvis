# Development Environment Overrides

# Database - Use local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/secure_blog?useSSL=false&serverTimezone=UTC&characterEncoding=utf8mb4

# JPA - Show SQL in dev
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT - Development secret (CHANGE THIS!)
app.jwt.secret=dev-secret-key-change-in-production-and-use-env-variable-256-bit-minimum

# Logging
logging.level.com.example.blog=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE