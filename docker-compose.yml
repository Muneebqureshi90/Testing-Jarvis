version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: secure-blog_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-secure_blog}
      MYSQL_USER: ${DB_USERNAME:-blog_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-blog_pass}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: secure-blog_backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES:-prod}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-secure_blog}
      DB_USERNAME: ${DB_USERNAME:-blog_user}
      DB_PASSWORD: ${DB_PASSWORD:-blog_pass}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
